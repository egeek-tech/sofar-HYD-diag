name: Release
# Direct release on push to master, driven by conventional commits via svu.
# Builds binaries once, attests provenance, ships in both tar artifacts and docker image.

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.ver.outputs.release }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Compute next version
        id: ver
        run: |
          go install github.com/caarlos0/svu/v3@latest
          CURRENT=$(svu current 2>/dev/null || echo v0.0.0)
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT"    >> "$GITHUB_OUTPUT"
          if [ "$NEXT" = "$CURRENT" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No version bump from conventional commits; skipping release."
          else
            echo "release=true"  >> "$GITHUB_OUTPUT"
            echo "Releasing $CURRENT -> $NEXT"
          fi

  build:
    needs: tag
    if: needs.tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binaries (linux/amd64 + linux/arm64)
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build \
              -ldflags="-s -w -X main.version=$VERSION" \
              -o "dist/server-$arch" ./cmd/server
            tar -C dist -czf "dist/sofar-hyd-diag-$VERSION-linux-$arch.tar.gz" "server-$arch"
          done

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/server-amd64
            dist/server-arm64

      # Atomic create-with-assets so it works with "Immutable releases" enabled.
      - name: Create GitHub release with tar assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          gh release create "$VERSION" \
            --generate-notes \
            --target "$TARGET_SHA" \
            dist/sofar-hyd-diag-*.tar.gz

      - name: Hand binaries off to docker job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: |
            dist/server-amd64
            dist/server-arm64
          retention-days: 1
          if-no-files-found: error

  docker:
    needs: [tag, build]
    if: needs.tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: dist/

      # COPY-only Dockerfile, no RUN — no QEMU emulation needed
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/sofar-hyd-diag
          tags: |
            type=raw,value=${{ needs.tag.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/sofar-hyd-diag
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
