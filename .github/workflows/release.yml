name: Release
# Direct release on push to master, driven by conventional commits via svu.
# Builds binaries once, attests provenance, ships in both tar artifacts and docker image.

on:
  push:
    branches: [master]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.ver.outputs.release }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Compute next version
        id: ver
        run: |
          go install github.com/caarlos0/svu/v3@latest
          CURRENT=$(svu current 2>/dev/null || echo v0.0.0)
          NEXT=$(svu next)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT"    >> "$GITHUB_OUTPUT"
          if [ "$NEXT" = "$CURRENT" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No version bump from conventional commits; skipping release."
          else
            echo "release=true"  >> "$GITHUB_OUTPUT"
            echo "Releasing $CURRENT -> $NEXT"
          fi

  build:
    needs: tag
    if: needs.tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Build binaries (linux/amd64 + linux/arm64)
        env:
          CGO_ENABLED: '0'
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build \
              -ldflags="-s -w -X main.version=$VERSION" \
              -o "dist/server-$arch" ./cmd/server
            tar -C dist -czf "dist/sofar-hyd-diag-$VERSION-linux-$arch.tar.gz" "server-$arch"
          done

      - name: Attest binary provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/server-amd64
            dist/server-arm64

      # Atomic create-with-assets so it works with "Immutable releases" enabled.
      - name: Create GitHub release with tar assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          gh release create "$VERSION" \
            --generate-notes \
            --target "$TARGET_SHA" \
            dist/sofar-hyd-diag-*.tar.gz

      - name: Hand binaries off to docker job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: |
            dist/server-amd64
            dist/server-arm64
          retention-days: 1
          if-no-files-found: error

  docker:
    needs: [tag, build]
    if: needs.tag.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: dist/

      # COPY-only Dockerfile, no RUN — no QEMU emulation needed
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/sofar-hyd-diag
          tags: |
            type=raw,value=${{ needs.tag.outputs.version }}
            type=raw,value=latest

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/sofar-hyd-diag
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
