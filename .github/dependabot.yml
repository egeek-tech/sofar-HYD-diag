version: 2

updates:
  # Go module dependencies (per D-01, D-02)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      all-go-deps:
        patterns:
          - "*"
    # Use "fix" so svu picks dep bumps up as a patch release.
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions dependencies (per D-03, D-04)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      all-actions:
        patterns:
          - "*"
    # Use "fix" so svu picks dep bumps up as a patch release.
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base image updates
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    groups:
      all-docker:
        patterns:
          - "*"
    # Use "fix" so svu picks dep bumps up as a patch release.
    commit-message:
      prefix: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
