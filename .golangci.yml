version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - asciicheck
    - durationcheck
    - copyloopvar
    - contextcheck
    - errcheck
    - errchkjson
    - errname
    - fatcontext
    # - gocritic
    # - goconst
    - gocyclo
    - godox
    - gomoddirectives
    - gosec
    - govet
    - ineffassign
    - intrange
    - mirror
    - musttag
    - nilerr
    # - predeclared not sure
    - revive
    - sloglint
    - staticcheck
    - tagliatelle
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
  settings:
    tagliatelle:
      # Lock the wire-format policy enforced repo-wide in PR #13: every JSON
      # tag on Go structs serialized to the WS or HTTP API must be camelCase.
      case:
        rules:
          json: camel
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
