version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - asciicheck
    - durationcheck
    - copyloopvar
    # - contextcheck  soon
    - errcheck
    - errchkjson
    - errname
    - fatcontext
    # - gocritic
    # - goconst
    # - gocyclo
    # - godox
    - gomoddirectives
    # - gosec      soon
    - govet
    - ineffassign
    - intrange
    - mirror
    - musttag
    - nilerr
    # - predeclared not sure
    - revive
    - sloglint
    - staticcheck
    # - tagliatelle  to enable when other errors fixed
    - testifylint
    - thelper
    - unconvert
    # - unparam — disabled 2026-05-11. 13 findings split between real code
    #   smells (dead returns / dead params / a stub `buildLazyModal` whose
    #   every branch returns nil) and test-helper future-flex parameters.
    #   Needs case-by-case judgment, not a blanket fix. Revisit per
    #   .planning/todos/pending/2026-05-11-unparam-revisit.md.
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
