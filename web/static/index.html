<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofar HYD Diagnostic Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">Sofar HYD Diagnostic Tool</h1>
    </header>

    <aside id="sidebar" class="sidebar">
        <!-- Connection Status (D-31) -->
        <div class="sidebar__section">
            <h2 class="sidebar__heading">Connection</h2>
            <div class="status-indicator">
                <span id="status-dot" class="status-dot status-dot--disconnected"></span>
                <span id="status-text" class="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Connection Form (CONN-01, CONN-02) -->
        <div class="sidebar__section">
            <h2 class="sidebar__heading">Inverter</h2>
            <form id="connection-form" class="connection-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="input-host">IP Address</label>
                    <input type="text" id="input-host" class="form-input"
                           pattern="^(\d{1,3}\.){3}\d{1,3}$|^[a-zA-Z0-9.-]+$"
                           placeholder="192.168.1.1" required>
                    <span class="form-error" id="error-host"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-port">Port</label>
                    <input type="number" id="input-port" class="form-input"
                           min="1" max="65535" placeholder="4192" required>
                    <span class="form-error" id="error-port"></span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="input-slave">Slave ID</label>
                    <input type="number" id="input-slave" class="form-input"
                           min="1" max="247" placeholder="1" required>
                    <span class="form-error" id="error-slave"></span>
                </div>
                <button type="submit" id="btn-connect" class="btn btn--connect">Connect</button>
            </form>
        </div>

        <!-- Section Navigation (D-32) -->
        <div class="sidebar__section">
            <h2 class="sidebar__heading">Sections</h2>
            <nav class="section-nav" id="section-nav">
                <button class="section-nav__item" data-section="system">
                    <span class="section-nav__icon">&#x2699;</span>
                    <span class="section-nav__label">System</span>
                </button>
                <button class="section-nav__item" data-section="grid">
                    <span class="section-nav__icon">&#x26A1;</span>
                    <span class="section-nav__label">Grid</span>
                </button>
                <button class="section-nav__item" data-section="eps">
                    <span class="section-nav__icon">&#x2B50;</span>
                    <span class="section-nav__label">EPS</span>
                </button>
                <button class="section-nav__item" data-section="pv">
                    <span class="section-nav__icon">&#x2600;</span>
                    <span class="section-nav__label">PV</span>
                </button>
                <button class="section-nav__item" data-section="battery">
                    <span class="section-nav__icon">&#x1F50B;</span>
                    <span class="section-nav__label">Battery</span>
                </button>
                <button class="section-nav__item" data-section="bms">
                    <span class="section-nav__icon">&#x1F50C;</span>
                    <span class="section-nav__label">BMS</span>
                </button>
                <button class="section-nav__item" data-section="stats">
                    <span class="section-nav__icon">&#x1F4CA;</span>
                    <span class="section-nav__label">Statistics</span>
                </button>
            </nav>
        </div>

        <!-- Sidebar Collapse Toggle -->
        <button id="sidebar-toggle" class="sidebar__toggle">
            <span id="sidebar-toggle-icon">&laquo;</span>
        </button>
    </aside>

    <main id="content" class="content content-flash">
        <div id="content-header" class="content__header">
            <h2 id="content-title" class="content__title">Not Connected</h2>
            <div class="content__header-controls">
                <select id="pv-channel-select" class="pv-channel-select" style="display:none;"></select>
                <div id="timing-controls" class="timing-controls" style="display:none;">
                    <span class="timing-control">
                        <label class="timing-control__label" for="timing-read-delay">Read Delay:</label>
                        <input type="number" id="timing-read-delay" class="timing-control__input" value="500" min="100" max="5000" step="100">
                        <span class="timing-control__unit">ms</span>
                    </span>
                    <span class="timing-control">
                        <label class="timing-control__label" for="timing-pack-settle">Pack Settle:</label>
                        <input type="number" id="timing-pack-settle" class="timing-control__input" value="1000" min="500" max="10000" step="100">
                        <span class="timing-control__unit">ms</span>
                    </span>
                </div>
                <button id="btn-auto-refresh" class="btn-auto-refresh" style="display:none;">Auto</button>
            </div>
        </div>
        <div id="content-body" class="content__body">
            <p class="content__empty">Enter your inverter connection details in the sidebar and click Connect.</p>
        </div>
        <div id="content-timestamp" class="content__timestamp" style="display:none;"></div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
